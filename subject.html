  const videosGrid = document.getElementById('videosGrid');

  // Convert any YouTube URL to embed URL
  function getEmbedLink(url) {
    try {
      if (url.includes("list=")) {
        const params = new URLSearchParams(url.split("?")[1]);
        return `https://www.youtube.com/embed/videoseries?list=${params.get("list")}`;
      }
      if (url.includes("youtu.be/")) {
        const id = url.split("/").pop().split("?")[0];
        return `https://www.youtube.com/embed/${id}`;
      }
      if (url.includes("youtube.com/watch")) {
        const params = new URLSearchParams(url.split("?")[1]);
        return `https://www.youtube.com/embed/${params.get("v")}`;
      }
      return url; 
    } catch (e) {
      console.error("Invalid URL:", url);
      return "";
    }
  }

  // Filter videos for selected class & subject
  const lectures = VIDEO_DATA.videos.filter(v => v.class === cls && v.subject === subject);
  const pdfs = PDF_DATA.pdfs.find(p => p.class === cls && p.subject === subject);

  if (lectures.length === 0 && !pdfs) {
    videosGrid.innerHTML = `<div class="glass p-5 rounded-2xl text-center">No content available for this subject yet.</div>`;
  } else {
    // Render videos
    lectures.forEach((video, index) => {
      const ytLink = getEmbedLink(video.link);
      const card = document.createElement('div');
      card.className = "glass rounded-2xl p-3 border border-black/5 dark:border-white/10 shadow-md";
      card.innerHTML = `
        <iframe class="w-full h-48 sm:h-56 md:h-64 rounded-md" src="${ytLink}" title="Lecture ${index+1}" frameborder="0" allowfullscreen></iframe>
        <div class="mt-2 font-medium">Lecture ${index+1}</div>
      `;
      videosGrid.appendChild(card);
    });

    // Render PDFs
    if (pdfs) {
      pdfs.files.forEach((file, idx) => {
        const card = document.createElement('div');
        card.className = "glass rounded-2xl p-5 border border-black/5 dark:border-white/10 shadow-md flex flex-col items-center";
        card.innerHTML = `
          <img src="assets/pdf-icon.png" alt="PDF Icon" class="w-12 h-12 mb-3"/>
          <div class="font-medium mb-2">PDF ${idx+1}</div>
          <a href="assets/pdf/class${cls}/${subject.toLowerCase()}/${file}.pdf" target="_blank" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">Open PDF</a>
        `;
